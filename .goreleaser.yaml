version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: bouton
    main: ./cmd/bouton
    binary: bouton
    env:
      - CGO_ENABLED=0
    # Windows is excluded: bouton depends on github.com/atakang7/axon/agent,
    # whose process-group shell tools are POSIX-only.
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: bouton
    name_template: "bouton_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  disable: true

release:
  github:
    owner: atakang7
    name: bouton
  draft: false
  prerelease: auto
  mode: append
